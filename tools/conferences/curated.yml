# Hand-maintained conference/workshop entries for the Conferences page.
#
# Focus: astrophysics/cosmology + ML/HPC overlap. General-science workshops
# are welcome if they typically carry astro/cosmo content.
#
# Fields:
#   id                  unique slug; stable across runs (used in the URL hash)
#   name                short display name
#   full_name           optional long form, shown as subtitle
#   url                 canonical CFP/homepage URL
#   parent              optional (e.g. "NeurIPS 2026")
#   location            short string, or "virtual"
#   submission_deadline ISO date (YYYY-MM-DD) or YYYY-MM-DDTHH:MM in UTC. Leave null if unknown.
#   deadline_note       free text — e.g. "AoE", "23:59 UTC", "papers only"
#   notification        ISO date (optional)
#   start               ISO date of event
#   end                 ISO date of event
#   tags                list — any of: ml, hpc, astro, cosmo, workshop, conference, physical_sciences
#   approximate         true if dates are estimates; shown with "~" in the UI
#   notes               free-text note
#
# Tips:
#   - Always include `tags`; the UI uses them for filter chips.
#   - If a big ML conf has multiple astro-relevant workshops, list each workshop
#     as its own entry (not the parent main track).
#   - Set `submission_deadline: null` for event-only entries; they'll still show
#     in the "Upcoming events" section.

entries:
